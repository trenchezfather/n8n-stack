services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:2.13.1-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    labels:
      caddy.email: "YOUR_EMAIL_HERE"

volumes:
  caddy_data:
  caddy_config:

networks:
  internal:
    name: vps_internal
    external: true